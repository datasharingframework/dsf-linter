version: 2
updates:
  # Java / Maven dependencies
  - package-ecosystem: "maven"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "sunday"
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      fhir:
        patterns:
          - "hapi-fhir*"
          - "org.hl7.fhir*"
      slf4j:
        patterns:
          - "org.slf4j*"
      testing-tools:
        patterns:
          - "org.junit*"
          - "org.mockito*"
      safe-patch-updates:
        update-types:
          - "patch"
      remaining-minor-updates:
        update-types:
          - "minor"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "sunday"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
